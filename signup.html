<!DOCTYPE html>
<!-- signup — email+password create · Turnstile · sends verify email (Auth v2 PR4) -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create your account — MAKETZO</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#06070A">
<meta name="turnstile-site-key" content="0x4AAAAAADPittVHWRDQG-cP">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/auth.css">
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="auth-body">

<div class="bg-trading" aria-hidden="true">
  <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#C9A84C" stroke-width="0.5" opacity="0.5">
      <line x1="0" y1="150" x2="1440" y2="150"/><line x1="0" y1="300" x2="1440" y2="300"/><line x1="0" y1="450" x2="1440" y2="450"/><line x1="0" y1="600" x2="1440" y2="600"/>
      <line x1="180" y1="0" x2="180" y2="900"/><line x1="360" y1="0" x2="360" y2="900"/><line x1="540" y1="0" x2="540" y2="900"/><line x1="720" y1="0" x2="720" y2="900"/><line x1="900" y1="0" x2="900" y2="900"/><line x1="1080" y1="0" x2="1080" y2="900"/><line x1="1260" y1="0" x2="1260" y2="900"/>
    </g>
  </svg>
</div>

<main class="auth-shell">
  <a href="/" class="auth-brand mk-brand-lockup mk-brand-lockup--stacked" aria-label="MAKETZO home">
    <img class="mk-brand-lockup__mark" src="assets/logo-mark.png" alt="">
    <img class="mk-brand-lockup__wordmark" src="assets/logo-wordmark.png" alt="MAKETZO">
  </a>

  <div class="auth-card">
    <p class="auth-eyebrow">CREATE ACCOUNT</p>
    <h1 class="auth-title">Start the <em>system.</em></h1>
    <p class="auth-sub">Free to create. The trial starts when you pick a plan.</p>

    <div id="banner" class="auth-banner" hidden></div>

    <button id="googleBtn" class="btn-google" type="button">
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.997 8.997 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.167 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <div class="auth-divider"><span>or</span></div>

    <form id="signupForm" novalidate>
      <div class="mk-form-field">
        <label for="name">Your name</label>
        <input id="name" name="name" type="text" autocomplete="name" required maxlength="100">
      </div>
      <div class="mk-form-field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required maxlength="200">
      </div>
      <div class="mk-form-field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required minlength="12">
        <span class="mk-form-hint">At least 12 characters · No requirements on symbols or case</span>
      </div>

      <div class="turnstile-wrap" id="turnstileWrap"></div>

      <button class="btn-primary auth-submit" type="submit" id="signupSubmit">Create account</button>
    </form>

    <div class="auth-foot">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <p class="auth-legal">
    By creating an account you agree to our <a href="terms.html">Terms</a>, <a href="privacy.html">Privacy Policy</a>, and <a href="disclaimer.html">Risk Disclaimer</a>.
  </p>
</main>

<script>
const API = (() => {
  const h = window.location.hostname;
  if (h === 'dev.maketzo.co' || h === 'staging.maketzo.co') return '';
  if (h === 'maketzo.co') return 'https://api.maketzo.co';
  return 'https://api.maketzo.co';
})();

const TURNSTILE_SITE_KEY = document.querySelector('meta[name="turnstile-site-key"]').content;
let turnstileWidgetId = null;

window.onloadTurnstileCallback = function () {
  if (!TURNSTILE_SITE_KEY) return;
  turnstileWidgetId = window.turnstile.render('#turnstileWrap', {
    sitekey: TURNSTILE_SITE_KEY,
    theme: 'dark'
  });
};
// Manually invoke once the script is ready.
const readyCheck = setInterval(() => {
  if (window.turnstile && TURNSTILE_SITE_KEY && turnstileWidgetId === null) {
    window.onloadTurnstileCallback();
    if (turnstileWidgetId !== null) clearInterval(readyCheck);
  } else if (!TURNSTILE_SITE_KEY) {
    clearInterval(readyCheck);
  }
}, 300);

const banner = document.getElementById('banner');
function showBanner(text, type) {
  banner.textContent = text;
  banner.className = 'auth-banner auth-banner--' + (type || 'info');
  banner.hidden = false;
}

document.getElementById('googleBtn').addEventListener('click', () => {
  window.location.href = API + '/auth/google';
});

document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('signupSubmit');
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!name || !email || !password) { showBanner('Name, email and password are required.', 'error'); return; }
  if (password.length < 12)         { showBanner('Password must be at least 12 characters.', 'error'); return; }

  let turnstileToken = '';
  if (TURNSTILE_SITE_KEY && window.turnstile && turnstileWidgetId !== null) {
    turnstileToken = window.turnstile.getResponse(turnstileWidgetId) || '';
    if (!turnstileToken) { showBanner('Please complete the captcha.', 'error'); return; }
  }

  const orig = btn.innerHTML;
  btn.innerHTML = 'Creating account…'; btn.disabled = true;
  try {
    const res = await fetch(API + '/auth/signup', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, turnstileToken })
    });
    const data = await res.json().catch(() => ({}));
    if (res.ok && data.ok) {
      window.location.href = 'verify-email.html?status=sent&email=' + encodeURIComponent(email);
      return;
    }
    if (res.status === 429) showBanner(data.error || 'Too many signup attempts. Please try again later.', 'error');
    else                    showBanner(data.error || 'Signup failed. Please try again.', 'error');
    if (TURNSTILE_SITE_KEY && window.turnstile && turnstileWidgetId !== null) window.turnstile.reset(turnstileWidgetId);
  } catch (err) {
    showBanner('Network error. Please try again.', 'error');
  } finally {
    btn.innerHTML = orig; btn.disabled = false;
  }
});
</script>
</body>
</html>
