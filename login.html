<!DOCTYPE html>
<!-- login — email+password · magic-link · Google · cookie session (Auth v2 PR4)
     Plan-aware mode: when ?plan=<priceId> is present, the page is the
     return-customer path of a "Start Free Trial" click. After a successful
     login we POST /billing/create-checkout (cookie session) and redirect
     to Stripe instead of /app. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — MAKETZO</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#06070A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="auth-body">

<div class="bg-trading" aria-hidden="true">
  <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#C9A84C" stroke-width="0.5" opacity="0.5">
      <line x1="0" y1="150" x2="1440" y2="150"/><line x1="0" y1="300" x2="1440" y2="300"/><line x1="0" y1="450" x2="1440" y2="450"/><line x1="0" y1="600" x2="1440" y2="600"/>
      <line x1="180" y1="0" x2="180" y2="900"/><line x1="360" y1="0" x2="360" y2="900"/><line x1="540" y1="0" x2="540" y2="900"/><line x1="720" y1="0" x2="720" y2="900"/><line x1="900" y1="0" x2="900" y2="900"/><line x1="1080" y1="0" x2="1080" y2="900"/><line x1="1260" y1="0" x2="1260" y2="900"/>
    </g>
  </svg>
</div>

<main class="auth-shell">
  <a href="/" class="auth-brand mk-brand-lockup mk-brand-lockup--stacked" aria-label="MAKETZO home">
    <img class="mk-brand-lockup__mark" src="assets/logo-mark.png" alt="">
    <img class="mk-brand-lockup__wordmark" src="assets/logo-wordmark.png" alt="MAKETZO">
  </a>

  <div class="auth-card">
    <p class="auth-eyebrow" id="eyebrow">SIGN IN</p>
    <h1 class="auth-title" id="title">Welcome back.</h1>
    <p class="auth-sub" id="sub">Sign in to keep your streak going.</p>

    <div id="banner" class="auth-banner" hidden></div>

    <button id="googleBtn" class="btn-google" type="button">
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.997 8.997 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.167 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <div class="auth-divider"><span>or</span></div>

    <form id="loginForm" novalidate>
      <div class="mk-form-field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required maxlength="200">
      </div>
      <div class="mk-form-field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn-primary auth-submit" type="submit" id="loginSubmit">Sign in</button>
    </form>

    <div class="auth-links">
      <a href="forgot-password.html">Forgot password?</a>
      <span class="auth-links-sep">·</span>
      <a href="#" id="magicLinkToggle">Email me a magic link</a>
    </div>

    <div class="auth-foot">
      New to MAKETZO? <a href="signup.html" id="signupLink">Create an account</a>
    </div>
  </div>

  <p class="auth-legal">
    By signing in you agree to our <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>.
  </p>
</main>

<script>
// API base URL — derived from page host so adding a new tier needs no JS change.
//   localhost / 127.* → http://localhost:3000
//   maketzo.co (apex) → https://api.maketzo.co
//   <sub>.maketzo.co  → https://<sub>-api.maketzo.co   (dev → dev-api, etc.)
const API = (() => {
  const h = window.location.hostname;
  if (h === 'localhost' || h.startsWith('127.')) return 'http://localhost:3000';
  if (h === 'maketzo.co') return 'https://api.maketzo.co';
  const parts = h.split('.');
  if (parts.length >= 3) return `https://${parts[0]}-api.${parts.slice(1).join('.')}`;
  return `https://api.${h}`;
})();

// ── Plan-aware mode ──────────────────────────────────────────
// Mirror of signup.html — keep TIER_BY_PRICE in sync there.
const TIER_BY_PRICE = {
  'price_1TUWS7JIDbUntZeXg0a1Sgj5': { name: 'Journal', amount: '$19/mo' },
  'price_1TUWUUJIDbUntZeX9CMTqV1D': { name: 'Journal', amount: '$159/yr' },
  'price_1TUWVpJIDbUntZeXyQD23z8W': { name: 'Pro',     amount: '$49/mo' },
  'price_1TUWZIJIDbUntZeXl4Xtfudj': { name: 'Pro',     amount: '$399/yr' },
  'price_1TUWabJIDbUntZeXYh8IrvEa': { name: 'Elite',   amount: '$79/mo' },
  'price_1TUWc2JIDbUntZeXOIkeHml4': { name: 'Elite',   amount: '$649/yr' }
};

const params = new URLSearchParams(window.location.search);
const planId = params.get('plan') || '';
const tier   = planId && TIER_BY_PRICE[planId] ? TIER_BY_PRICE[planId] : null;

if (tier) {
  document.getElementById('eyebrow').textContent = `START ${tier.name.toUpperCase()} TRIAL`;
  document.getElementById('title').innerHTML = `Sign in to start <em>${tier.name}.</em>`;
  document.getElementById('sub').textContent = `${tier.amount} · 7-day free trial · no charge until day 8.`;
  document.getElementById('loginSubmit').textContent = 'Sign in & start trial';
  document.getElementById('signupLink').setAttribute('href', 'signup.html?plan=' + encodeURIComponent(planId));
}

const banner = document.getElementById('banner');
function showBanner(text, type) {
  banner.textContent = text;
  banner.className = 'auth-banner auth-banner--' + (type || 'info');
  banner.hidden = false;
}
if (params.get('magic') === 'invalid') showBanner('That magic link is invalid or expired. Sign in with your password or request a new one.', 'error');
if (params.get('reset') === 'ok')     showBanner('Password reset. You can sign in with your new password.', 'ok');
if (params.get('verified') === '1')   showBanner('Email verified. Sign in to continue.', 'ok');

function getCsrfCookie() {
  const m = document.cookie.match(/(?:^|;\s*)mkt_csrf=([^;]+)/);
  return m ? decodeURIComponent(m[1]) : '';
}

async function startStripeCheckoutWithSession() {
  const csrf = getCsrfCookie();
  const res = await fetch(API + '/billing/create-checkout', {
    method: 'POST',
    credentials: 'include',
    headers: Object.assign(
      { 'Content-Type': 'application/json' },
      csrf ? { 'X-CSRF-Token': csrf } : {}
    ),
    body: JSON.stringify({ priceId: planId })
  });
  const data = await res.json().catch(() => ({}));
  if (data.url) { window.location.href = data.url; return true; }
  showBanner(data.error || 'Could not start checkout. Please try again.', 'error');
  return false;
}

document.getElementById('googleBtn').addEventListener('click', () => {
  const url = API + '/auth/google' + (planId ? '?checkout=' + encodeURIComponent(planId) : '');
  window.location.href = url;
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginSubmit');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showBanner('Email and password are required.', 'error'); return; }
  const orig = btn.innerHTML;
  btn.innerHTML = planId ? 'Starting trial…' : 'Signing in…';
  btn.disabled = true;
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json().catch(() => ({}));
    if (res.ok && data.ok) {
      if (planId) {
        const ok = await startStripeCheckoutWithSession();
        if (!ok) { btn.innerHTML = orig; btn.disabled = false; }
        return;
      }
      window.location.href = '/app';
      return;
    }
    if (res.status === 403 && data.code === 'PENDING_DELETION') {
      showBanner('This account is scheduled for deletion. Email info@maketzo.co to restore it.', 'error');
    } else if (res.status === 429) {
      showBanner(data.error || 'Too many attempts. Please wait a minute and try again.', 'error');
    } else {
      showBanner(data.error || 'Invalid email or password.', 'error');
    }
  } catch (err) {
    showBanner('Network error. Please try again.', 'error');
  } finally {
    btn.innerHTML = orig; btn.disabled = false;
  }
});

document.getElementById('magicLinkToggle').addEventListener('click', (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const url = 'forgot-password.html' + (email ? '?email=' + encodeURIComponent(email) + '&magic=1' : '?magic=1');
  window.location.href = url;
});
</script>
</body>
</html>
