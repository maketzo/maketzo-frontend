<!DOCTYPE html>
<!-- forgot-password — request reset email · always 204 from server (Auth v2 PR4)
     Also doubles as magic-link request when ?magic=1 (Turnstile shown only in that case). -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset your password — MAKETZO</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#06070A">
<meta name="turnstile-site-key" content="0x4AAAAAADPittVHWRDQG-cP">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/auth.css">
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="auth-body">

<div class="bg-trading" aria-hidden="true">
  <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#C9A84C" stroke-width="0.5" opacity="0.5">
      <line x1="0" y1="150" x2="1440" y2="150"/><line x1="0" y1="300" x2="1440" y2="300"/><line x1="0" y1="450" x2="1440" y2="450"/><line x1="0" y1="600" x2="1440" y2="600"/>
      <line x1="180" y1="0" x2="180" y2="900"/><line x1="360" y1="0" x2="360" y2="900"/><line x1="540" y1="0" x2="540" y2="900"/><line x1="720" y1="0" x2="720" y2="900"/><line x1="900" y1="0" x2="900" y2="900"/><line x1="1080" y1="0" x2="1080" y2="900"/><line x1="1260" y1="0" x2="1260" y2="900"/>
    </g>
  </svg>
</div>

<main class="auth-shell">
  <a href="/" class="auth-brand mk-brand-lockup mk-brand-lockup--stacked" aria-label="MAKETZO home">
    <img class="mk-brand-lockup__mark" src="assets/logo-mark.png" alt="">
    <img class="mk-brand-lockup__wordmark" src="assets/logo-wordmark.png" alt="MAKETZO">
  </a>

  <div class="auth-card" id="formView">
    <p class="auth-eyebrow" id="eyebrow">PASSWORD RESET</p>
    <h1 class="auth-title" id="title">Reset your password.</h1>
    <p class="auth-sub" id="sub">Enter your email and we'll send a link to choose a new password.</p>

    <div id="banner" class="auth-banner" hidden></div>

    <form id="resetForm" novalidate>
      <div class="mk-form-field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required maxlength="200">
      </div>

      <div class="turnstile-wrap" id="turnstileWrap" hidden></div>

      <button class="btn-primary auth-submit" type="submit" id="resetSubmit">Send reset link</button>
    </form>

    <div class="auth-foot">
      Remembered it? <a href="login.html">Back to sign in</a>
    </div>
  </div>

  <div class="auth-card" id="sentView" hidden>
    <div class="auth-status">
      <div class="auth-status-icon auth-status-icon--info" aria-hidden="true">✓</div>
      <h1 class="auth-title" id="sentTitle">Check your email.</h1>
      <p class="auth-sub" id="sentSub">If an account exists for that email, you'll get a link in the next minute. It expires in one hour.</p>
    </div>
    <div class="auth-foot">
      <a href="login.html">Back to sign in</a>
    </div>
  </div>
</main>

<script>
// API base URL — derived from page host so adding a new tier needs no JS change.
//   localhost / 127.* → http://localhost:3000
//   maketzo.co (apex) → https://api.maketzo.co
//   <sub>.maketzo.co  → https://<sub>-api.maketzo.co   (dev → dev-api, etc.)
const API = (() => {
  const h = window.location.hostname;
  if (h === 'localhost' || h.startsWith('127.')) return 'http://localhost:3000';
  if (h === 'maketzo.co') return 'https://api.maketzo.co';
  const parts = h.split('.');
  if (parts.length >= 3) return `https://${parts[0]}-api.${parts.slice(1).join('.')}`;
  return `https://api.${h}`;
})();

const params = new URLSearchParams(window.location.search);
const isMagic = params.get('magic') === '1';
const presetEmail = params.get('email') || '';
if (presetEmail) document.getElementById('email').value = presetEmail;

if (isMagic) {
  document.getElementById('eyebrow').textContent = 'MAGIC LINK';
  document.getElementById('title').textContent = 'Sign in with a link.';
  document.getElementById('sub').textContent = "We'll email you a one-time sign-in link. Good for 15 minutes.";
  document.getElementById('resetSubmit').textContent = 'Email me a sign-in link';
  document.getElementById('sentTitle').textContent = 'Check your email.';
  document.getElementById('sentSub').textContent = "If we know that email, a sign-in link is on its way. It expires in 15 minutes.";
}

const TURNSTILE_SITE_KEY = document.querySelector('meta[name="turnstile-site-key"]').content;
let turnstileWidgetId = null;
if (isMagic && TURNSTILE_SITE_KEY) {
  const wrap = document.getElementById('turnstileWrap');
  wrap.hidden = false;
  const readyCheck = setInterval(() => {
    if (window.turnstile && turnstileWidgetId === null) {
      turnstileWidgetId = window.turnstile.render('#turnstileWrap', { sitekey: TURNSTILE_SITE_KEY, theme: 'dark' });
      if (turnstileWidgetId !== null) clearInterval(readyCheck);
    }
  }, 300);
}

const banner = document.getElementById('banner');
function showBanner(text, type) {
  banner.textContent = text;
  banner.className = 'auth-banner auth-banner--' + (type || 'info');
  banner.hidden = false;
}

document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('resetSubmit');
  const email = document.getElementById('email').value.trim();
  if (!email) { showBanner('Email is required.', 'error'); return; }

  let turnstileToken = '';
  if (isMagic && TURNSTILE_SITE_KEY && window.turnstile && turnstileWidgetId !== null) {
    turnstileToken = window.turnstile.getResponse(turnstileWidgetId) || '';
    if (!turnstileToken) { showBanner('Please complete the captcha.', 'error'); return; }
  }

  const orig = btn.innerHTML;
  btn.innerHTML = 'Sending…'; btn.disabled = true;

  const endpoint = isMagic ? '/auth/magic-link/request' : '/auth/forgot-password';
  const body = isMagic ? { email, turnstileToken } : { email };

  try {
    const res = await fetch(API + endpoint, {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    // Server always returns 204 (no enumeration). Show the same "check email" view either way.
    if (res.status === 204 || res.ok) {
      document.getElementById('formView').hidden = true;
      document.getElementById('sentView').hidden = false;
      return;
    }
    if (res.status === 429) {
      const data = await res.json().catch(() => ({}));
      showBanner(data.error || 'Too many requests. Please try again later.', 'error');
    } else {
      showBanner('Something went wrong. Please try again.', 'error');
    }
  } catch (err) {
    showBanner('Network error. Please try again.', 'error');
  } finally {
    btn.innerHTML = orig; btn.disabled = false;
  }
});
</script>
</body>
</html>
